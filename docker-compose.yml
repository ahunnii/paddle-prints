services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_TILES_URL: ${NEXT_PUBLIC_TILES_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      INVITE_CODE: ${INVITE_CODE}
      NEXT_PUBLIC_TILES_URL: ${NEXT_PUBLIC_TILES_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # Source archive for per-trip offline extracts, read from the shared tiles volume (mounted
      # read-only below — the app only ever reads it; extracts are written to the container tmpdir).
      TILES_ARCHIVE_PATH: /tiles/michigan.pmtiles
      # User-uploaded avatars land here (see apps/web/src/app/api/avatars/). Backed by the
      # `uploadsdata` volume below so photos survive redeploys.
      UPLOADS_DIR: /uploads
    volumes:
      # The same volume the `tiles` service populates, mounted read-only so the app can `pmtiles
      # extract` per-trip corridors from michigan.pmtiles without any risk of mutating it.
      - tilesdata:/tiles:ro
      - uploadsdata:/uploads
    depends_on:
      - db

  db:
    image: pgrouting/pgrouting:16-3.5-4.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-paddle-prints}
    ports:
      # Bound to the host's loopback only — lets you reach Postgres through an SSH
      # tunnel (for the waterway ETL and maintenance) without exposing it publicly.
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tiles:
    build:
      context: .
      dockerfile: deploy/tiles.Dockerfile
    restart: unless-stopped
    volumes:
      - tilesdata:/srv

volumes:
  pgdata:
  tilesdata:
  uploadsdata:
