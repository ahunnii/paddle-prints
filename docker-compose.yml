services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_TILES_URL: ${NEXT_PUBLIC_TILES_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      INVITE_CODE: ${INVITE_CODE}
      NEXT_PUBLIC_TILES_URL: ${NEXT_PUBLIC_TILES_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      - db

  db:
    image: pgrouting/pgrouting:16-3.5-4.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-paddle-prints}
    ports:
      # Bound to the host's loopback only — lets you reach Postgres through an SSH
      # tunnel (for the waterway ETL and maintenance) without exposing it publicly.
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tiles:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - tilesdata:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  pgdata:
  tilesdata:
